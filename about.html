<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trevio — About Us</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#000;
  --bg2:#0c0c0c;
  --bg3:#141414;
  --ink:#f0ede8;
  --ink-mid:#8a8a8a;
  --ink-light:#2a2a2a;
  --green:#3ecf3e;
  --line:rgba(255,255,255,0.07);
  --font-heading:'Cormorant Garamond',serif;
  --font-body:'DM Mono',monospace;
  --font-size-body:13px;
  --font-size-hero:clamp(3rem,6vw,5.5rem);
  --font-size-section:clamp(2rem,4vw,3.2rem);
  --font-weight-heading:300;
  --letter-spacing-heading:-.02em;
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--font-body);font-weight:300;overflow-x:hidden;cursor:none}

body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:100;
}

/* ── CURSOR ─────────────────────────────────────────────────── */
.cur-dot{width:5px;height:5px;background:var(--green);border-radius:50%;position:fixed;transform:translate(-50%,-50%);pointer-events:none;z-index:99999}
.cur-ring{width:28px;height:28px;border:1px solid rgba(62,207,62,.35);border-radius:50%;position:fixed;transform:translate(-50%,-50%);pointer-events:none;z-index:99998;transition:width .25s,height .25s,border-color .25s}
@media(hover:none){.cur-dot,.cur-ring{display:none!important}body{cursor:auto!important}}

/* ── HEADER ─────────────────────────────────────────────────── */
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:22px 48px;border-bottom:1px solid var(--line);
  position:sticky;top:0;
  background:rgba(0,0,0,.92);backdrop-filter:blur(12px);
  z-index:500;
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink)}
.logo-img{height:30px;display:block;width:auto}
.logo-mark-text{
  font-family:var(--font-body);font-size:.95rem;font-weight:400;
  letter-spacing:.22em;text-transform:uppercase;color:var(--ink);
}
.header-nav{display:flex;gap:24px;align-items:center}
.nav-btn{
  font-family:var(--font-body);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  background:none;border:none;color:var(--ink-mid);cursor:none;text-decoration:none;
  padding:3px 0;position:relative;transition:color .2s;
}
.nav-btn::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;
  background:var(--green);transform:scaleX(0);transform-origin:left;transition:transform .25s;
}
.nav-btn:hover{color:var(--ink)}
.nav-btn.active{color:var(--ink)}
.nav-btn.active::after,.nav-btn:hover::after{transform:scaleX(1)}
@media(hover:none){.nav-btn{cursor:auto}}

/* ── ABOUT HERO ─────────────────────────────────────────────── */
.about-hero{
  padding:96px 48px 80px;border-bottom:1px solid var(--line);
  display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:end;
}
.about-hero-label{
  font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--green);margin-bottom:24px;
}
.about-hero-title{
  font-family:var(--font-heading);
  font-size:var(--font-size-hero);
  font-weight:var(--font-weight-heading);
  line-height:.88;letter-spacing:var(--letter-spacing-heading);color:var(--ink);
}
.about-hero-title em{font-style:italic;color:var(--green)}
.about-hero-desc{font-size:var(--font-size-body);line-height:2.1;color:var(--ink-mid);max-width:440px;padding-bottom:8px}

/* ── SECTION BASE ───────────────────────────────────────────── */
.section-label{
  font-size:8px;letter-spacing:.35em;text-transform:uppercase;color:var(--green);
  margin-bottom:28px;display:flex;align-items:center;gap:12px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--line)}
.section-title{
  font-family:var(--font-heading);
  font-size:var(--font-size-section);
  font-weight:var(--font-weight-heading);
  line-height:1.05;letter-spacing:var(--letter-spacing-heading);color:var(--ink);margin-bottom:24px;
}
.section-body{font-size:var(--font-size-body);line-height:2.1;color:var(--ink-mid);max-width:560px}

/* ── WHO WE ARE + WHAT WE DO — two columns ──────────────────── */
.about-two-col{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  border-bottom:1px solid var(--line);background:var(--line);
}
.about-col{padding:72px 48px;background:var(--bg)}

/* ── OUR VALUE ──────────────────────────────────────────────── */
.about-value{
  padding:96px 48px;border-bottom:1px solid var(--line);
  display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;
}
.value-headline{
  font-family:var(--font-heading);
  font-size:clamp(2.8rem,5vw,4.5rem);
  font-weight:var(--font-weight-heading);
  line-height:.9;letter-spacing:var(--letter-spacing-heading);color:var(--ink);
}
.value-headline em{font-style:italic;color:var(--green)}
.value-body{font-size:var(--font-size-body);line-height:2.1;color:var(--ink-mid)}

/* ── WHY WORK WITH US ───────────────────────────────────────── */
.about-why{padding:72px 48px;border-bottom:1px solid var(--line)}
.why-list{list-style:none;display:flex;flex-direction:column;gap:0;margin-top:40px}
.why-item{
  display:grid;grid-template-columns:64px 1fr 24px;
  align-items:center;gap:24px;
  padding:24px 0;border-top:1px solid var(--line);
  transition:background .2s;
}
.why-item:last-child{border-bottom:1px solid var(--line)}
.why-num{
  font-family:var(--font-heading);font-size:2rem;font-weight:300;
  color:var(--ink-light);line-height:1;letter-spacing:-.02em;
  transition:color .25s;
}
.why-text{
  font-size:14px;line-height:1.75;
  color:var(--ink);letter-spacing:.01em;
}
.why-arrow{
  font-size:14px;color:var(--ink-light);
  transition:color .25s,transform .25s;
}
.why-item:hover .why-num{color:var(--green)}
.why-item:hover .why-arrow{color:var(--green);transform:translateX(4px)}

/* ── OUR PROCESS ────────────────────────────────────────────── */
.about-process{padding:72px 48px;border-bottom:1px solid var(--line)}
.process-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:var(--line);margin-top:48px;
}
.process-step{
  padding:40px 36px;background:var(--bg2);
  opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease;
}
.process-step.visible{opacity:1;transform:translateY(0)}
.step-num{
  font-family:var(--font-heading);font-size:3.5rem;font-weight:300;
  color:var(--ink-light);line-height:1;margin-bottom:20px;letter-spacing:-.02em;
}
.step-title{font-family:var(--font-heading);font-size:1.2rem;font-weight:400;color:var(--ink);margin-bottom:12px;letter-spacing:.02em}
.step-desc{font-size:9.5px;line-height:2;color:var(--ink-mid)}

/* ── CTA ────────────────────────────────────────────────────── */
.about-cta{
  padding:96px 48px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:40px;
}
.cta-eyebrow{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mid)}
.cta-headline{
  font-family:var(--font-heading);
  font-size:clamp(2.5rem,5vw,4rem);
  font-weight:var(--font-weight-heading);
  line-height:.92;letter-spacing:var(--letter-spacing-heading);color:var(--ink);
}
.cta-headline em{font-style:italic;color:var(--green)}
.cta-btn{
  display:inline-flex;align-items:center;gap:12px;
  font-family:var(--font-body);font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  padding:16px 36px;border:1px solid rgba(255,255,255,.18);
  background:none;color:var(--ink);text-decoration:none;cursor:none;
  transition:border-color .25s,color .25s,box-shadow .25s;border-radius:2px;
}
.cta-btn:hover{border-color:var(--green);color:var(--green);box-shadow:0 0 28px rgba(62,207,62,.1)}
.cta-arrow{transition:transform .25s}
.cta-btn:hover .cta-arrow{transform:translateX(4px)}
@media(hover:none){.cta-btn{cursor:auto}}

/* ── FOOTER ─────────────────────────────────────────────────── */
.site-footer{border-top:1px solid var(--line);background:var(--bg);padding:64px 48px 0}
.footer-top{
  display:grid;grid-template-columns:220px 1fr;gap:64px;
  padding-bottom:52px;border-bottom:1px solid var(--line);
}
.footer-brand{display:flex;flex-direction:column;gap:16px}
.footer-logo-wrap{display:flex;align-items:center;gap:9px}
.footer-brand-desc{font-size:9px;line-height:1.9;color:var(--ink-mid);letter-spacing:.04em}
.footer-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
.footer-col-title{font-family:var(--font-body);font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--ink);margin-bottom:18px}
.footer-col-link{display:block;font-size:12px;color:var(--ink-mid);text-decoration:none;letter-spacing:.06em;padding:5px 0;transition:color .2s}
.footer-col-link:hover{color:var(--green)}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding:18px 0}
.footer-copy{font-size:11px;color:var(--ink-mid);letter-spacing:.08em}
.footer-brand-desc{font-size:12px;line-height:1.9;color:var(--ink-mid);letter-spacing:.04em}

/* ── SCROLL TO TOP ──────────────────────────────────────────── */
.scroll-top-btn{
  position:fixed;bottom:36px;right:36px;
  width:52px;height:52px;border-radius:50%;
  background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.15);
  color:var(--ink);cursor:none;
  display:flex;align-items:center;justify-content:center;
  z-index:9000;
  opacity:0;pointer-events:none;
  transition:opacity .35s,border-color .2s,color .2s,background .2s,transform .2s;
  backdrop-filter:blur(8px);
}
.scroll-top-btn.visible{opacity:1;pointer-events:all}
.scroll-top-btn:hover{
  border-color:var(--green);color:var(--green);
  background:rgba(0,0,0,.9);transform:translateY(-3px);
}
@media(hover:none){.scroll-top-btn{cursor:auto}}

/* ── RESPONSIVE ─────────────────────────────────────────────── */
@media(max-width:768px){
  header{padding:18px 20px}
  .about-hero{grid-template-columns:1fr;padding:56px 20px;gap:28px}
  .about-hero-title{font-size:clamp(2.8rem,10vw,4.5rem)}
  .about-two-col{grid-template-columns:1fr}
  .about-col{padding:52px 20px}
  .about-value{grid-template-columns:1fr;padding:64px 20px}
  .about-why{padding:56px 20px}
  .about-process{padding:56px 20px}
  .process-grid{grid-template-columns:1fr}
  .about-cta{padding:72px 20px}
  .site-footer{padding:48px 20px 0}
  .footer-top{grid-template-columns:1fr;gap:36px}
  .footer-cols{grid-template-columns:repeat(2,1fr);gap:20px}
}
@media(max-width:600px){
  .footer-cols{grid-template-columns:1fr;gap:12px}
  .header-nav{gap:16px}
}
@media(hover:none){
  .nav-btn,.cta-btn{cursor:auto}
}
</style>
</head>
<body>

<div class="cur-dot" id="curDot"></div>
<div class="cur-ring" id="curRing"></div>

<header>
  <a href="index.html" class="logo" id="site-logo"></a>
  <nav class="header-nav">
    <a href="about.html" class="nav-btn active">About Us</a>
    <a href="index.html" class="nav-btn">Portfolio</a>
  </nav>
</header>

<!-- HERO — uses ABOUT_HERO_TITLE / ABOUT_HERO_DESC, separate from section content -->
<section class="about-hero">
  <div>
    <h1 class="about-hero-title" id="about-hero-title"></h1>
  </div>
  <p class="about-hero-desc" id="about-hero-desc"></p>
</section>

<!-- WHO WE ARE + WHAT WE DO -->
<div class="about-two-col">
  <div class="about-col">
    <p class="section-label" id="who-label"></p>
    <h2 class="section-title" id="who-title"></h2>
    <p class="section-body"  id="who-text"></p>
  </div>
  <div class="about-col">
    <p class="section-label" id="what-label"></p>
    <h2 class="section-title" id="what-title"></h2>
    <p class="section-body"  id="what-text"></p>
  </div>
</div>

<!-- OUR VALUE -->
<section class="about-value">
  <div>
    <p class="section-label" id="value-label"></p>
    <div class="value-headline" id="value-headline"></div>
  </div>
  <p class="value-body" id="value-body"></p>
</section>

<!-- WHY WORK WITH US -->
<section class="about-why">
  <p class="section-label" id="why-label"></p>
  <h2 class="section-title" id="why-title"></h2>
  <ul class="why-list" id="why-list"></ul>
</section>

<!-- OUR PROCESS -->
<section class="about-process">
  <p class="section-label" id="process-label"></p>
  <h2 class="section-title" id="process-title"></h2>
  <div class="process-grid" id="process-grid"></div>
</section>

<!-- CTA -->
<section class="about-cta">
  <p class="cta-eyebrow">Ready to see the results?</p>
  <h2 class="cta-headline">One photo.<br><em>Infinite visuals.</em></h2>
  <a href="#" class="cta-btn" id="cta-link">
    <span id="cta-text">View Our Portfolio</span>
    <span class="cta-arrow">→</span>
  </a>
</section>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-top">
    <div class="footer-brand">
      <div class="footer-logo-wrap" id="footer-logo-el"></div>
      <p class="footer-brand-desc" id="footer-brand-desc"></p>
    </div>
    <div class="footer-cols" id="footer-cols"></div>
  </div>
  <div class="footer-bottom">
    <div class="footer-copy" id="footer-copy-el"></div>
  </div>
</footer>

<button class="scroll-top-btn" id="scrollTopBtn" aria-label="Back to top">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <path d="M9 13V5M5 9l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<script src="config.js"></script>
<script>
// ── TYPOGRAPHY FROM CONFIG ──────────────────────────────────────
(function(){
  var r = document.documentElement.style;
  var map = {
    '--font-heading':          typeof FONT_HEADING            !== 'undefined' ? FONT_HEADING            : null,
    '--font-body':             typeof FONT_BODY               !== 'undefined' ? FONT_BODY               : null,
    '--font-size-body':        typeof FONT_SIZE_BODY          !== 'undefined' ? FONT_SIZE_BODY          : null,
    '--font-size-hero':        typeof FONT_SIZE_HERO          !== 'undefined' ? FONT_SIZE_HERO          : null,
    '--font-size-section':     typeof FONT_SIZE_SECTION       !== 'undefined' ? FONT_SIZE_SECTION       : null,
    '--font-weight-heading':   typeof FONT_WEIGHT_HEADING     !== 'undefined' ? FONT_WEIGHT_HEADING     : null,
    '--letter-spacing-heading':typeof LETTER_SPACING_HEADING  !== 'undefined' ? LETTER_SPACING_HEADING  : null,
  };
  Object.keys(map).forEach(function(k){ if(map[k]) r.setProperty(k, map[k]); });
})();

document.title = ABOUT_PAGE_TITLE;

// ── LOGO ────────────────────────────────────────────────────────
(function(){
  var svgMark = '<svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">'
    + '<path fill-rule="evenodd" clip-rule="evenodd" fill="white"'
    + ' d="M3 3H17C22 3 24 7 24 12C24 20 17 23 10 23H3V3Z'
    + ' M7 7H13C16.5 7 18.5 9.5 18.5 12.5C18.5 16.5 15.5 19 10.5 19H7V7Z'
    + ' M10 11H12.5C13.9 11 15 12.1 15 13.5C15 14.9 13.9 16 12.5 16H10V11Z"/>'
    + '</svg>';

  function buildLogo(small) {
    if (LOGO) {
      return '<img src="' + LOGO + '" alt="' + BRAND_NAME + '" class="logo-img"'
        + (small ? ' style="height:22px"' : '') + '>';
    }
    return svgMark + '<span class="logo-mark-text" style="'
      + (small ? 'font-size:.85rem' : '') + '">' + BRAND_NAME + '</span>';
  }

  document.getElementById('site-logo').innerHTML = buildLogo(false);
  document.getElementById('footer-logo-el').innerHTML = buildLogo(true);
})();

// ── HERO ────────────────────────────────────────────────────────
document.getElementById('about-hero-title').innerHTML =
  typeof ABOUT_HERO_TITLE !== 'undefined' ? ABOUT_HERO_TITLE : 'About<br><em>Trevio</em>';
document.getElementById('about-hero-desc').textContent =
  typeof ABOUT_HERO_DESC !== 'undefined' ? ABOUT_HERO_DESC : '';

// ── WHO WE ARE ──────────────────────────────────────────────────
document.getElementById('who-label').textContent = ABOUT_WHO_TITLE;
document.getElementById('who-title').textContent = ABOUT_WHO_TITLE;
document.getElementById('who-text').textContent  = ABOUT_WHO_TEXT;

// ── WHAT WE DO ──────────────────────────────────────────────────
document.getElementById('what-label').textContent = ABOUT_WHAT_TITLE;
document.getElementById('what-title').textContent = ABOUT_WHAT_TITLE;
document.getElementById('what-text').textContent  = ABOUT_WHAT_TEXT;

// ── OUR VALUE ───────────────────────────────────────────────────
document.getElementById('value-label').textContent = ABOUT_VALUE_TITLE;
document.getElementById('value-headline').innerHTML =
  ABOUT_VALUE_HEADLINE.replace(/(Infinite visuals\.)/i, '<em>$1</em>');
document.getElementById('value-body').textContent = ABOUT_VALUE_TEXT;

// ── WHY WORK WITH US ────────────────────────────────────────────
document.getElementById('why-label').textContent = ABOUT_WHY_TITLE;
document.getElementById('why-title').textContent = ABOUT_WHY_TITLE;
var whyList = document.getElementById('why-list');
ABOUT_WHY_ITEMS.forEach(function(item, i){
  var li = document.createElement('li');
  li.className = 'why-item';
  var num = (i + 1 < 10 ? '0' : '') + (i + 1);
  li.innerHTML = '<span class="why-num">' + num + '</span>'
    + '<span class="why-text">' + item + '</span>'
    + '<span class="why-arrow">→</span>';
  whyList.appendChild(li);
});

// ── OUR PROCESS ─────────────────────────────────────────────────
document.getElementById('process-label').textContent = ABOUT_PROCESS_TITLE;
document.getElementById('process-title').textContent = ABOUT_PROCESS_TITLE;
var processGrid = document.getElementById('process-grid');
ABOUT_PROCESS_STEPS.forEach(function(step, i){
  var el = document.createElement('div');
  el.className = 'process-step';
  el.style.transitionDelay = (i * 0.1) + 's';
  el.innerHTML = '<div class="step-num">' + step.label + '</div>'
    + '<h3 class="step-title">' + step.title + '</h3>'
    + '<p class="step-desc">' + step.desc + '</p>';
  processGrid.appendChild(el);
});

// ── CTA ─────────────────────────────────────────────────────────
document.getElementById('cta-text').textContent = ABOUT_CTA_TEXT;
document.getElementById('cta-link').href = ABOUT_CTA_LINK;

// ── FOOTER ──────────────────────────────────────────────────────
document.getElementById('footer-brand-desc').textContent =
  typeof FOOTER_BRAND_DESC !== 'undefined' ? FOOTER_BRAND_DESC : '';
document.getElementById('footer-copy-el').textContent = FOOTER_COPY;

if (typeof FOOTER_COLUMNS !== 'undefined') {
  var colsEl = document.getElementById('footer-cols');
  FOOTER_COLUMNS.forEach(function(col){
    var div = document.createElement('div');
    div.className = 'footer-col';
    div.innerHTML = '<div class="footer-col-title">' + col.title + '</div>'
      + col.links.map(function(l){
          return '<a href="' + l.href + '" class="footer-col-link">' + l.label + '</a>';
        }).join('');
    colsEl.appendChild(div);
  });
}
// ── SCROLL TO TOP ────────────────────────────────────────────────
var scrollBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', function(){
  if(window.scrollY > 400) scrollBtn.classList.add('visible');
  else scrollBtn.classList.remove('visible');
}, {passive:true});
scrollBtn.addEventListener('click', function(){ window.scrollTo({top:0,behavior:'smooth'}); });

// ── SCROLL ANIMATIONS ───────────────────────────────────────────
var obs = new IntersectionObserver(function(entries){
  entries.forEach(function(e){ if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.process-step').forEach(function(el){ obs.observe(el); });

// ── CURSOR ───────────────────────────────────────────────────────
var dot  = document.getElementById('curDot');
var ring = document.getElementById('curRing');
if (window.matchMedia('(hover: hover)').matches) {
  var mx=0, my=0, rx=0, ry=0;
  document.addEventListener('mousemove', function(e){ mx=e.clientX; my=e.clientY; dot.style.left=mx+'px'; dot.style.top=my+'px'; });
  (function animRing(){ rx+=(mx-rx)*.22; ry+=(my-ry)*.22; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(animRing); })();
}
</script>
</body>
</html>
