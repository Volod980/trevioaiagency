<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trevio — Our Work</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#000;
  --bg2:#0c0c0c;
  --bg3:#141414;
  --ink:#f0ede8;
  --ink-mid:#8a8a8a;
  --ink-light:#2a2a2a;
  --green:#3ecf3e;
  --line:rgba(255,255,255,0.07);
  /* Typography — controlled via config.js */
  --font-heading:'Cormorant Garamond',serif;
  --font-body:'DM Mono',monospace;
  --font-size-body:13px;
  --font-size-hero:clamp(3rem,6vw,5.5rem);
  --font-size-section:clamp(2rem,4vw,3.2rem);
  --font-weight-heading:300;
  --letter-spacing-heading:-.02em;
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--font-body);font-weight:300;overflow-x:hidden;cursor:none}

body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:100;
}

/* ── CURSOR ─────────────────────────────────────────────────── */
.cur-dot{width:5px;height:5px;background:var(--green);border-radius:50%;position:fixed;transform:translate(-50%,-50%);pointer-events:none;z-index:99999}
.cur-ring{width:28px;height:28px;border:1px solid rgba(62,207,62,.35);border-radius:50%;position:fixed;transform:translate(-50%,-50%);pointer-events:none;z-index:99998;transition:width .25s,height .25s,border-color .25s}
@media(hover:none){.cur-dot,.cur-ring{display:none!important}body{cursor:auto!important}}
body:has(.pair:hover) .cur-ring{width:40px;height:40px;border-color:var(--green)}

/* ── HEADER ─────────────────────────────────────────────────── */
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:22px 48px;
  border-bottom:1px solid var(--line);
  position:sticky;top:0;
  background:rgba(0,0,0,.92);backdrop-filter:blur(12px);
  z-index:500;
}

/* Logo: SVG mark + text, or image if LOGO is set */
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink)}
.logo-img{height:30px;display:block;width:auto}
.logo-mark-text{
  font-family:var(--font-body);font-size:.95rem;font-weight:400;
  letter-spacing:.22em;text-transform:uppercase;color:var(--ink);
}

/* Nav — no borders, underline-only style */
.header-nav{display:flex;gap:24px;align-items:center}
.nav-btn{
  font-family:var(--font-body);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  background:none;border:none;color:var(--ink-mid);cursor:none;text-decoration:none;
  padding:3px 0;position:relative;transition:color .2s;
}
.nav-btn::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;
  background:var(--green);transform:scaleX(0);transform-origin:left;transition:transform .25s;
}
.nav-btn:hover{color:var(--ink)}
.nav-btn.active{color:var(--ink)}
.nav-btn.active::after,.nav-btn:hover::after{transform:scaleX(1)}
@media(hover:none){.nav-btn{cursor:auto}}

/* ── HERO ───────────────────────────────────────────────────── */
.intro{display:grid;grid-template-columns:1fr 1fr;min-height:520px;border-bottom:1px solid var(--line)}
.intro-left{
  padding:72px 48px;
  display:flex;flex-direction:column;justify-content:space-between;
  border-right:1px solid var(--line);
}
.intro-title{
  font-family:var(--font-heading);
  font-size:var(--font-size-hero);
  font-weight:var(--font-weight-heading);
  line-height:.92;letter-spacing:var(--letter-spacing-heading);color:var(--ink);
}
.intro-title em{font-style:italic;color:var(--green)}
.intro-bottom{display:flex;flex-direction:column;gap:10px}
.intro-desc{font-size:var(--font-size-body);line-height:2;color:var(--ink-mid);max-width:340px}
.intro-right{
  position:relative;overflow:hidden;background:var(--bg2);
  display:flex;align-items:center;justify-content:center;padding:48px;
}
.hero-deck{position:relative;width:360px;height:380px}
.hero-photo-wrap{position:absolute;width:190px;height:320px;top:50%;left:50%}
.hero-photo-wrap:first-child{transform:translate(-90%,-50%) rotate(-6deg);z-index:1}
.hero-photo-wrap:last-child{transform:translate(-10%,-50%) rotate(5deg);z-index:2}
.hero-photo-wrap img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.hero-placeholder{
  width:100%;height:100%;background:var(--bg3);border:1px solid var(--line);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-light);font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
}

/* ── TABS ───────────────────────────────────────────────────── */
.tabs-bar{display:flex;justify-content:space-between;align-items:center;padding:0 48px;border-bottom:1px solid var(--line)}
.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x;user-select:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  font-family:var(--font-body);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-mid);padding:20px 24px;
  cursor:none;white-space:nowrap;background:none;border:none;
  position:relative;transition:color .25s;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.tab::after{content:'';position:absolute;bottom:0;left:24px;right:24px;height:1px;background:transparent;transition:background .25s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink)}
.tab.active::after{background:var(--green)}

/* ── CASES ──────────────────────────────────────────────────── */
.cases{padding:32px 48px 60px}
.pair-wrap{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}
.pair-wrap.visible{opacity:1;transform:translateY(0)}

.pair{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  position:relative;overflow:hidden;cursor:none;
  margin-top:1px;background:var(--line);
  max-width:960px;margin-left:auto;margin-right:auto;
}

/* center arrow */
.pair-arrow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:10;width:36px;height:36px;
  background:var(--bg);border:1px solid var(--line);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--ink-mid);transition:all .25s ease;
  box-shadow:0 0 0 4px var(--bg);
}
.pair:hover .pair-arrow{
  background:var(--green);border-color:var(--green);color:#000;
  transform:translate(-50%,-50%) scale(1.08);
  box-shadow:0 0 0 4px var(--bg),0 0 20px rgba(62,207,62,.2);
}

/* photo sides — no overflow so labels can sit below */
.side{position:relative;background:var(--bg2);aspect-ratio:4/5;overflow:hidden}
.side img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;transition:transform .6s cubic-bezier(.25,.46,.45,.94)}
.side img[data-focus="top"]{object-position:center top}
.side img[data-focus="bottom"]{object-position:center bottom}
.pair:hover .side img{transform:scale(1.03)}

/* card navigation arrows */
.card-after-arr{
  position:absolute;top:50%;transform:translateY(-50%);
  width:32px;height:32px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:2px;color:var(--ink);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  cursor:none;transition:all .2s;z-index:6;opacity:0;
}
.side.after:hover .card-after-arr{opacity:1}
.card-after-arr:hover{background:var(--green);color:#000;border-color:var(--green)}
.card-after-arr.left{left:52px}
.card-after-arr.right{right:10px}

.more-badge{
  position:absolute;bottom:14px;right:14px;
  font-family:var(--font-heading);font-size:11px;font-style:italic;letter-spacing:.04em;
  padding:4px 12px;z-index:5;
  background:var(--green);color:#000;pointer-events:none;white-space:nowrap;border-radius:1px;
}

/* labels below photo pair (not ON photos) */
.pair-labels{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:var(--line);
  max-width:960px;margin-left:auto;margin-right:auto;
  margin-bottom:40px;
}
.pair-label-cell{
  padding:16px 20px;background:var(--bg2);
  font-family:var(--font-body);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink);display:flex;align-items:center;gap:10px;
  transition:background .2s;
}
.pair-label-cell::before{
  content:'';width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0;
}
.pair-label-cell.ai-label{
  color:var(--green);justify-content:flex-end;flex-direction:row-reverse;
}
.pair-label-cell.ai-label::before{background:var(--green);opacity:.7}

/* ── GRID SWITCHER ──────────────────────────────────────────── */
.grid-switcher{display:flex;gap:2px;align-items:center;padding:20px 0}
.grid-btn{
  width:32px;height:32px;background:none;border:none;cursor:none;
  display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0;opacity:.3;
}
.grid-btn:hover{opacity:.7}
.grid-btn.active{opacity:1}
.grid-btn svg rect,.grid-btn svg path{fill:var(--ink);transition:fill .2s}
.grid-btn.active svg rect,.grid-btn.active svg path{fill:var(--green)}
.grid-label{font-family:var(--font-body);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mid);margin-right:8px}

.cases-header{display:flex;justify-content:flex-end;align-items:center;padding:16px 48px 0;gap:8px}
.cases-header .grid-label{font-size:8px;letter-spacing:.15em;color:var(--ink-mid)}
.cases-header .grid-switcher{padding:0;gap:1px}
.cases-header .grid-btn{width:30px;height:30px;opacity:.25;border:1px solid transparent;border-radius:2px}
.cases-header .grid-btn:hover{opacity:.6;border-color:var(--line)}
.cases-header .grid-btn.active{opacity:1;border-color:var(--ink-light)}

/* grid modes */
.cases.cols-1 .pair,.cases.cols-1 .pair-labels{max-width:960px;margin-left:auto;margin-right:auto}
.cases.cols-2{display:grid;grid-template-columns:1fr 1fr;gap:32px;padding:32px 48px 60px}
.cases.cols-2 .pair-wrap{margin:0}
.cases.cols-2 .pair,.cases.cols-2 .pair-labels{max-width:100%;margin:0}
.cases.cols-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;padding:32px 32px 60px}
.cases.cols-3 .pair-wrap{margin:0}
.cases.cols-3 .pair,.cases.cols-3 .pair-labels{max-width:100%;margin:0}

/* ── LIGHTBOX ───────────────────────────────────────────────── */
.lb{
  position:fixed;inset:0;z-index:8000;
  background:rgba(0,0,0,.96);backdrop-filter:blur(24px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .35s ease;
}
.lb.open{opacity:1;pointer-events:all}
.lb-images{display:flex;gap:2px;max-height:78vh;align-items:stretch}
.lb-side{
  position:relative;overflow:hidden;background:var(--bg2);
  transform:translateY(14px);transition:transform .4s cubic-bezier(.25,.46,.45,.94);
}
.lb.open .lb-side{transform:translateY(0)}
.lb-side:last-child{transition-delay:.05s}
.lb-side img{height:78vh;width:auto;max-width:38vw;display:block;object-fit:cover}
.lb-side img[data-focus="top"]{object-position:center top}
.lb-side img[data-focus="bottom"]{object-position:center bottom}
.lb-side-label{position:absolute;top:14px;font-size:8px;letter-spacing:.2em;text-transform:uppercase;padding:4px 10px;font-family:var(--font-body)}
.lb-side.before .lb-side-label{left:14px;background:rgba(255,255,255,.07);color:var(--ink-mid);border:1px solid var(--line)}
.lb-side.after  .lb-side-label{right:14px;background:var(--green);color:#000}

.lb-after-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:32px;height:32px;
  background:rgba(0,0,0,.75);border:1px solid var(--line);
  border-radius:2px;color:var(--ink-mid);font-size:20px;line-height:1;
  display:none;align-items:center;justify-content:center;
  cursor:none;transition:all .2s;z-index:10;
}
.lb-after-arrow:hover{background:var(--green);color:#000;border-color:var(--green)}
.lb-after-arrow-left{left:10px}
.lb-after-arrow-right{right:10px}
.lb-side.after:hover .lb-after-arrow,.lb-after-arrow:focus{display:flex}
.lb-dots:not(:empty) ~ * .lb-after-arrow,.lb-side.after .lb-after-arrow{display:flex}

.lb-dots{display:flex;gap:6px;align-items:center}
.lb-dot{width:5px;height:5px;border-radius:50%;background:var(--ink-light);border:none;cursor:none;transition:all .2s;padding:0}
.lb-dot.active{background:var(--green);transform:scale(1.3)}

.lb-bottom{display:flex;justify-content:space-between;align-items:center;width:100%;padding:16px 32px 0;max-width:80vw}
.lb-title{font-family:var(--font-heading);font-size:1rem;font-weight:300;color:var(--ink-mid);letter-spacing:.05em}
.lb-nav{display:flex;gap:6px}
.lb-btn{width:36px;height:36px;border:1px solid var(--line);background:none;color:var(--ink-mid);cursor:none;font-size:14px;border-radius:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:var(--font-body)}
.lb-btn:hover{border-color:var(--green);color:var(--green)}
.lb-close{
  position:fixed;top:20px;right:20px;width:46px;height:46px;
  border:2px solid rgba(255,255,255,.3);background:rgba(0,0,0,.55);
  color:#fff;cursor:none;font-size:20px;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-family:var(--font-body);z-index:8100;
  backdrop-filter:blur(6px);
}
.lb-close:hover{border-color:var(--green);color:var(--green);background:rgba(0,0,0,.8)}

/* ── FOOTER ─────────────────────────────────────────────────── */
.site-footer{border-top:1px solid var(--line);background:var(--bg);padding:64px 48px 0}
.footer-top{
  display:grid;grid-template-columns:220px 1fr;gap:64px;
  padding-bottom:52px;border-bottom:1px solid var(--line);
}
.footer-brand{display:flex;flex-direction:column;gap:16px}
.footer-logo-wrap{display:flex;align-items:center;gap:9px}
.footer-brand-desc{font-size:9px;line-height:1.9;color:var(--ink-mid);letter-spacing:.04em}
.footer-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
.footer-col-title{
  font-family:var(--font-body);font-size:10px;letter-spacing:.25em;text-transform:uppercase;
  color:var(--ink);margin-bottom:18px;
}
.footer-col-link{
  display:block;font-size:12px;color:var(--ink-mid);text-decoration:none;
  letter-spacing:.06em;padding:5px 0;transition:color .2s;
}
.footer-col-link:hover{color:var(--green)}
.footer-bottom{
  display:flex;justify-content:space-between;align-items:center;padding:18px 0;
}
.footer-copy{font-size:11px;color:var(--ink-mid);letter-spacing:.08em}
.footer-brand-desc{font-size:12px;line-height:1.9;color:var(--ink-mid);letter-spacing:.04em}

/* ── SEE MORE ───────────────────────────────────────────────── */
.see-more-wrap{
  grid-column:1 / -1;display:flex;align-items:center;gap:24px;
  padding:48px 0 28px;
}
.see-more-wrap::before,.see-more-wrap::after{
  content:'';flex:1;height:1px;background:var(--line);
}
.see-more-btn{
  font-family:var(--font-body);font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  padding:13px 32px;border:1px solid rgba(255,255,255,.12);
  background:none;color:var(--ink-mid);cursor:none;
  display:flex;align-items:center;gap:10px;white-space:nowrap;
  transition:border-color .25s,color .25s,background .25s;border-radius:2px;
}
.see-more-btn::after{content:'↓';font-size:13px;line-height:1}
.see-more-btn:hover{border-color:var(--green);color:var(--green);background:rgba(62,207,62,.04)}
@media(hover:none){.see-more-btn{cursor:auto}}

/* ── SCROLL TO TOP ──────────────────────────────────────────── */
.scroll-top-btn{
  position:fixed;bottom:36px;right:36px;
  width:52px;height:52px;border-radius:50%;
  background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.15);
  color:var(--ink);cursor:none;
  display:flex;align-items:center;justify-content:center;
  z-index:9000;
  opacity:0;pointer-events:none;
  transition:opacity .35s,border-color .2s,color .2s,background .2s,transform .2s;
  backdrop-filter:blur(8px);
}
.scroll-top-btn.visible{opacity:1;pointer-events:all}
.scroll-top-btn:hover{
  border-color:var(--green);color:var(--green);
  background:rgba(0,0,0,.9);transform:translateY(-3px);
}
@media(hover:none){.scroll-top-btn{cursor:auto}}

/* ── RESPONSIVE ─────────────────────────────────────────────── */
@media(max-width:900px){
  .cases.cols-3{grid-template-columns:1fr 1fr;gap:20px}
  .footer-cols{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  header{padding:18px 20px}
  .intro{grid-template-columns:1fr;min-height:auto}
  .intro-left{padding:52px 20px 40px;border-right:none}
  .intro-right{display:none}
  .tabs-bar,.cases-header{padding-left:20px;padding-right:20px}
  .cases,.cases.cols-2,.cases.cols-3{grid-template-columns:1fr;padding:24px 20px 60px;gap:16px}
  .cases-header{display:none}
  .site-footer{padding:48px 20px 0}
  .footer-top{grid-template-columns:1fr;gap:36px}
  .footer-cols{grid-template-columns:repeat(2,1fr);gap:20px}
  .lb{align-items:center;justify-content:center}
  .lb-images{display:block;width:90vw;margin:0 auto}
  .lb-side.before{display:none}
  .lb-side.after{display:block;width:90vw;height:70vh;border-radius:12px;overflow:hidden;max-width:none;transform:none}
  .lb-side.after img{width:90vw;height:70vh;max-width:none;object-fit:cover;object-position:center}
  .lb-bottom{max-width:90vw;padding:12px 0 0}
}
@media(max-width:600px){
  .footer-cols{grid-template-columns:1fr;gap:12px}
  .header-nav{gap:16px}
}
@media(max-width:480px){
  .pair-arrow{width:30px;height:30px;font-size:11px}
}
@media(hover:none){
  .nav-btn,.lb-close,.lb-btn,.lb-after-arrow,.card-after-arr,.grid-btn,.tab{cursor:auto}
}
</style>
</head>
<body>

<div class="cur-dot" id="curDot"></div>
<div class="cur-ring" id="curRing"></div>

<header>
  <a href="index.html" class="logo" id="site-logo"></a>
  <nav class="header-nav">
    <a href="about.html" class="nav-btn">About Us</a>
    <a href="index.html" class="nav-btn active">Portfolio</a>
  </nav>
</header>

<div class="intro">
  <div class="intro-left">
    <h1 class="intro-title" id="intro-title"></h1>
    <div class="intro-bottom">
      <p class="intro-desc" id="intro-desc"></p>
    </div>
  </div>
  <div class="intro-right">
    <div class="hero-deck">
      <div class="hero-photo-wrap">
        <div class="hero-placeholder" id="hero-before-ph">your photo</div>
        <img id="hero-before" src="" alt="Product" style="display:none">
      </div>
      <div class="hero-photo-wrap">
        <div class="hero-placeholder" id="hero-after-ph">ai result</div>
        <img id="hero-after" src="" alt="AI Result" style="display:none">
      </div>
    </div>
  </div>
</div>

<div class="tabs-bar">
  <div class="tabs" id="tabs"></div>
</div>

<div class="cases-header">
  <span class="grid-label">View</span>
  <div class="grid-switcher">
    <button class="grid-btn active" id="grid-1" title="1 column">
      <svg width="14" height="14" viewBox="0 0 14 14"><rect x="2" y="2" width="10" height="4" rx="1"/><rect x="2" y="8" width="10" height="4" rx="1"/></svg>
    </button>
    <button class="grid-btn" id="grid-2" title="2 columns">
      <svg width="14" height="14" viewBox="0 0 14 14"><rect x="2" y="2" width="4" height="10" rx="1"/><rect x="8" y="2" width="4" height="10" rx="1"/></svg>
    </button>
    <button class="grid-btn" id="grid-3" title="3 columns">
      <svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="2" width="3" height="10" rx="1"/><rect x="5.5" y="2" width="3" height="10" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/></svg>
    </button>
  </div>
</div>

<div class="cases" id="cases"></div>

<!-- ── FOOTER ── -->
<footer class="site-footer">
  <div class="footer-top">
    <div class="footer-brand">
      <div class="footer-logo-wrap" id="footer-logo-el"></div>
      <p class="footer-brand-desc" id="footer-brand-desc"></p>
    </div>
    <div class="footer-cols" id="footer-cols"></div>
  </div>
  <div class="footer-bottom">
    <div class="footer-copy" id="footer-copy-el"></div>
  </div>
</footer>

<button class="scroll-top-btn" id="scrollTopBtn" aria-label="Back to top">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <path d="M9 13V5M5 9l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<!-- ── LIGHTBOX ── -->
<div class="lb" id="lb">
  <button class="lb-close" id="lb-close">✕</button>
  <div class="lb-images">
    <div class="lb-side before">
      <div class="lb-side-label">Product</div>
      <img id="lb-img-before" src="" alt="">
    </div>
    <div class="lb-side after" style="position:relative">
      <div class="lb-side-label">AI</div>
      <img id="lb-img-after" src="" alt="">
      <button class="lb-after-arrow lb-after-arrow-left" id="lb-after-prev">‹</button>
      <button class="lb-after-arrow lb-after-arrow-right" id="lb-after-next">›</button>
    </div>
  </div>
  <div class="lb-bottom">
    <div class="lb-title" id="lb-title"></div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="lb-dots" id="lb-dots"></div>
      <div class="lb-nav">
        <button class="lb-btn" id="lb-prev">←</button>
        <button class="lb-btn" id="lb-next">→</button>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
// ── TYPOGRAPHY FROM CONFIG ──────────────────────────────────────
(function(){
  var r = document.documentElement.style;
  var map = {
    '--font-heading':          typeof FONT_HEADING            !== 'undefined' ? FONT_HEADING            : null,
    '--font-body':             typeof FONT_BODY               !== 'undefined' ? FONT_BODY               : null,
    '--font-size-body':        typeof FONT_SIZE_BODY          !== 'undefined' ? FONT_SIZE_BODY          : null,
    '--font-size-hero':        typeof FONT_SIZE_HERO          !== 'undefined' ? FONT_SIZE_HERO          : null,
    '--font-size-section':     typeof FONT_SIZE_SECTION       !== 'undefined' ? FONT_SIZE_SECTION       : null,
    '--font-weight-heading':   typeof FONT_WEIGHT_HEADING     !== 'undefined' ? FONT_WEIGHT_HEADING     : null,
    '--letter-spacing-heading':typeof LETTER_SPACING_HEADING  !== 'undefined' ? LETTER_SPACING_HEADING  : null,
  };
  Object.keys(map).forEach(function(k){ if(map[k]) r.setProperty(k, map[k]); });
})();

document.title = SITE_TITLE;
document.getElementById('intro-title').innerHTML = SITE_LINE1 + '<br><em>' + SITE_LINE2 + '</em>';
document.getElementById('intro-desc').textContent = SITE_DESC;

// ── LOGO ────────────────────────────────────────────────────────
(function(){
  // SVG mark for default text logo — abstract nested-shape mark
  var svgMark = '<svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">'
    + '<path fill-rule="evenodd" clip-rule="evenodd" fill="white"'
    + ' d="M3 3H17C22 3 24 7 24 12C24 20 17 23 10 23H3V3Z'
    + ' M7 7H13C16.5 7 18.5 9.5 18.5 12.5C18.5 16.5 15.5 19 10.5 19H7V7Z'
    + ' M10 11H12.5C13.9 11 15 12.1 15 13.5C15 14.9 13.9 16 12.5 16H10V11Z"/>'
    + '</svg>';

  function buildLogo(small) {
    if (LOGO) {
      return '<img src="' + LOGO + '" alt="' + BRAND_NAME + '" class="logo-img"'
        + (small ? ' style="height:22px"' : '') + '>';
    }
    return svgMark + '<span class="logo-mark-text" style="'
      + (small ? 'font-size:.85rem' : '') + '">' + BRAND_NAME + '</span>';
  }

  document.getElementById('site-logo').innerHTML = buildLogo(false);
  document.getElementById('footer-logo-el').innerHTML = buildLogo(true);
})();

// ── FOOTER ──────────────────────────────────────────────────────
document.getElementById('footer-brand-desc').textContent =
  typeof FOOTER_BRAND_DESC !== 'undefined' ? FOOTER_BRAND_DESC : '';
document.getElementById('footer-copy-el').textContent = FOOTER_COPY;

if (typeof FOOTER_COLUMNS !== 'undefined') {
  var colsEl = document.getElementById('footer-cols');
  FOOTER_COLUMNS.forEach(function(col) {
    var div = document.createElement('div');
    div.className = 'footer-col';
    div.innerHTML = '<div class="footer-col-title">' + col.title + '</div>'
      + col.links.map(function(l) {
          return '<a href="' + l.href + '" class="footer-col-link">' + l.label + '</a>';
        }).join('');
    colsEl.appendChild(div);
  });
}

// ── SCROLL TO TOP ────────────────────────────────────────────────
var scrollBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', function(){
  if(window.scrollY > 400) scrollBtn.classList.add('visible');
  else scrollBtn.classList.remove('visible');
}, {passive:true});
scrollBtn.addEventListener('click', function(){ window.scrollTo({top:0,behavior:'smooth'}); });

// ── HERO PHOTOS ─────────────────────────────────────────────────
// To change hero photos update the paths below (or move them to config.js)
var HERO_BEFORE = 'https://res.cloudinary.com/danbmkdx8/image/upload/v1772750120/hf_20260301_202225_0b6204f8-a2e5-4e68-b96f-05de71711523_ns8df3.jpg';
var HERO_AFTER  = 'https://res.cloudinary.com/danbmkdx8/image/upload/v1772750221/hf_20260301_202655_a74a14c6-af04-4219-846c-0a7e15969091_aml2pd.jpg';
if (HERO_BEFORE) { document.getElementById('hero-before-ph').style.display='none'; var hb=document.getElementById('hero-before'); hb.src=HERO_BEFORE; hb.style.display='block'; }
if (HERO_AFTER)  { document.getElementById('hero-after-ph').style.display='none';  var ha=document.getElementById('hero-after');  ha.src=HERO_AFTER;  ha.style.display='block'; }

// ── TABS & CASES ─────────────────────────────────────────────────
var tabsEl    = document.getElementById('tabs');
var casesEl   = document.getElementById('cases');
var allTags   = ['All'].concat([].filter.call(CASES.map(function(c){return c.tag}), function(v,i,a){return a.indexOf(v)===i;}));
var activeTab = 'All', currentFiltered = CASES.slice(), lbCur = 0, lbAfterIdx = 0;
var ROWS_TO_SHOW = 10;

// grid switcher — manual override
var currentCols = 3;
casesEl.classList.add('cols-3');
[1,2,3].forEach(function(n){
  document.getElementById('grid-'+n).addEventListener('click', function(){
    currentCols = n;
    [1,2,3].forEach(function(x){ document.getElementById('grid-'+x).classList.toggle('active', x===n); });
    casesEl.className = 'cases cols-'+n;
  });
});
// set grid-3 as initially active
[1,2,3].forEach(function(x){ document.getElementById('grid-'+x).classList.toggle('active', x===3); });

allTags.forEach(function(tag){
  var btn = document.createElement('button');
  btn.className = 'tab' + (tag==='All' ? ' active' : '');
  btn.textContent = tag;
  btn.addEventListener('click', function(){ switchTab(tag); });
  tabsEl.appendChild(btn);
});

function setColsForTab(tag) {
  var cols = (tag === 'All') ? 3 : 1;
  currentCols = cols;
  [1,2,3].forEach(function(x){ document.getElementById('grid-'+x).classList.toggle('active', x===cols); });
}

function switchTab(tag, updateHash) {
  if (updateHash === undefined) updateHash = true;
  activeTab = tag;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.textContent===tag); });
  setColsForTab(tag);
  currentFiltered = tag==='All' ? CASES.slice() : CASES.filter(function(c){ return c.tag===tag; });
  renderCases(currentFiltered);
  if (updateHash) {
    var hash = tag==='All' ? '' : '#'+tag.toLowerCase().replace(/ /g,'-');
    history.replaceState(null,'', hash||window.location.pathname);
  }
}

function getAfterArr(c){ return (Array.isArray(c.after) ? c.after : [c.after]).concat(c.results||[]); }

function buildCaseWrap(c, globalIdx, animDelay) {
  var wrap = document.createElement('div');
  wrap.className = 'pair-wrap';
  wrap.style.transitionDelay = animDelay+'s';
  var afterArr = getAfterArr(c);
  var hasMore  = afterArr.length > 1;
  var cardAfterIdx = 0;
  wrap.innerHTML =
    '<div class="pair" data-idx="'+globalIdx+'">'
    + '<div class="side before">'
    +   '<img src="'+c.before+'" loading="lazy" alt="'+c.title+'" data-focus="'+(c.focusBefore||'center')+'">'
    + '</div>'
    + '<div class="pair-arrow">→</div>'
    + '<div class="side after">'
    +   '<img src="'+afterArr[0]+'" loading="lazy" alt="'+c.title+'" data-focus="'+(c.focusAfter||'top')+'" class="after-img">'
    +   (hasMore ? '<button class="card-after-arr left" data-dir="-1">‹</button>' : '')
    +   (hasMore ? '<button class="card-after-arr right" data-dir="1">›</button>' : '')
    +   (hasMore ? '<div class="more-badge">+' + (afterArr.length-1) + ' more</div>' : '')
    + '</div>'
    + '</div>'
    + '<div class="pair-labels">'
    +   '<div class="pair-label-cell">Product</div>'
    +   '<div class="pair-label-cell ai-label">AI</div>'
    + '</div>';
  wrap.querySelector('.pair').addEventListener('click', function(){ openLb(globalIdx, cardAfterIdx); });
  if (hasMore) {
    wrap.querySelectorAll('.card-after-arr').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        cardAfterIdx = (cardAfterIdx + parseInt(btn.dataset.dir) + afterArr.length) % afterArr.length;
        var img = wrap.querySelector('.after-img');
        img.style.opacity='0'; img.style.transition='opacity .2s';
        setTimeout(function(){
          img.src = afterArr[cardAfterIdx]; img.style.opacity='1';
          var b = wrap.querySelector('.more-badge'); if(b) b.textContent='+' + (afterArr.length-1) + ' more';
        }, 150);
      });
    });
  }
  return wrap;
}

function renderCases(list) {
  casesEl.style.opacity='0'; casesEl.style.transform='translateY(8px)'; casesEl.style.transition='opacity .25s ease,transform .25s ease';
  casesEl.className = 'cases cols-'+currentCols;
  setTimeout(function(){
    casesEl.innerHTML = '';
    var shown = Math.min(list.length, ROWS_TO_SHOW * currentCols);
    for (var i = 0; i < shown; i++) {
      casesEl.appendChild(buildCaseWrap(list[i], i, i*0.06));
    }
    if (list.length > shown) {
      var moreWrap = document.createElement('div');
      moreWrap.className = 'see-more-wrap';
      moreWrap.innerHTML = '<button class="see-more-btn">See more</button>';
      moreWrap.querySelector('.see-more-btn').addEventListener('click', function(){
        moreWrap.remove();
        for (var j = shown; j < list.length; j++) {
          var w = buildCaseWrap(list[j], j, 0);
          casesEl.appendChild(w);
        }
        casesEl.querySelectorAll('.pair-wrap:not(.visible)').forEach(function(el, idx){
          setTimeout(function(){ el.classList.add('visible'); }, idx*60);
        });
      });
      casesEl.appendChild(moreWrap);
    }
    casesEl.style.opacity='1'; casesEl.style.transform='translateY(0)';
    requestAnimationFrame(function(){
      document.querySelectorAll('.pair-wrap').forEach(function(el,i){
        setTimeout(function(){ el.classList.add('visible'); }, i*60);
      });
    });
  }, 260);
}

// ── LIGHTBOX ─────────────────────────────────────────────────────
var lb       = document.getElementById('lb');
var lbBefore = document.getElementById('lb-img-before');
var lbAfter  = document.getElementById('lb-img-after');
var lbTitleEl= document.getElementById('lb-title');
var lbDotsEl = document.getElementById('lb-dots');

function openLb(i, afterIdx) { lbCur=i; lbAfterIdx=afterIdx||0; updateLb(); lb.classList.add('open'); document.body.style.overflow='hidden'; }
function closeLb() { lb.classList.remove('open'); document.body.style.overflow=''; }
function updateLb() {
  var c = currentFiltered[lbCur]; var afterArr = getAfterArr(c);
  lbBefore.style.opacity='0'; lbAfter.style.opacity='0';
  setTimeout(function(){
    lbBefore.src = c.before; lbBefore.setAttribute('data-focus', c.focusBefore||'center');
    lbAfter.src  = afterArr[lbAfterIdx]||afterArr[0]; lbAfter.setAttribute('data-focus', c.focusAfter||'top');
    lbTitleEl.textContent = c.title;
    lbDotsEl.innerHTML = '';
    if (afterArr.length > 1) {
      afterArr.forEach(function(_, di){
        var dot = document.createElement('button');
        dot.className = 'lb-dot' + (di===lbAfterIdx ? ' active' : '');
        dot.addEventListener('click', function(){ lbAfterIdx=di; updateLb(); });
        lbDotsEl.appendChild(dot);
      });
    }
    lbBefore.style.opacity='1'; lbAfter.style.opacity='1';
  }, 200);
}
function lbNextAfter(){ var a=getAfterArr(currentFiltered[lbCur]); lbAfterIdx=(lbAfterIdx+1)%a.length; updateLb(); }
function lbPrevAfter(){ var a=getAfterArr(currentFiltered[lbCur]); lbAfterIdx=(lbAfterIdx-1+a.length)%a.length; updateLb(); }

document.getElementById('lb-close').addEventListener('click', closeLb);
document.getElementById('lb-prev').addEventListener('click', function(){ lbCur=(lbCur-1+currentFiltered.length)%currentFiltered.length; lbAfterIdx=0; updateLb(); });
document.getElementById('lb-next').addEventListener('click', function(){ lbCur=(lbCur+1)%currentFiltered.length; lbAfterIdx=0; updateLb(); });
document.getElementById('lb-after-prev').addEventListener('click', lbPrevAfter);
document.getElementById('lb-after-next').addEventListener('click', lbNextAfter);
lb.addEventListener('click', function(e){ if(e.target===lb) closeLb(); });
document.addEventListener('keydown', function(e){
  if (!lb.classList.contains('open')) return;
  if (e.key==='Escape') closeLb();
  if (e.key==='ArrowLeft')  { lbCur=(lbCur-1+currentFiltered.length)%currentFiltered.length; lbAfterIdx=0; updateLb(); }
  if (e.key==='ArrowRight') { lbCur=(lbCur+1)%currentFiltered.length; lbAfterIdx=0; updateLb(); }
});

// ── HASH ROUTING ─────────────────────────────────────────────────
function getTabFromHash(){
  var hash = window.location.hash.replace('#','').replace(/-/g,' ');
  if (!hash) return 'All';
  return allTags.find(function(t){ return t.toLowerCase()===hash.toLowerCase(); }) || 'All';
}
var initialTab = getTabFromHash();
document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.textContent===initialTab); });
currentFiltered = initialTab==='All' ? CASES.slice() : CASES.filter(function(c){ return c.tag===initialTab; });
activeTab = initialTab;
setColsForTab(initialTab);
renderCases(currentFiltered);
window.addEventListener('hashchange', function(){ switchTab(getTabFromHash(), false); });

// ── CURSOR ───────────────────────────────────────────────────────
var dot  = document.getElementById('curDot');
var ring = document.getElementById('curRing');
if (window.matchMedia('(hover: hover)').matches) {
  var mx=0, my=0, rx=0, ry=0;
  document.addEventListener('mousemove', function(e){ mx=e.clientX; my=e.clientY; dot.style.left=mx+'px'; dot.style.top=my+'px'; });
  // Increased lerp factor: 0.22 → ring follows dot much more closely
  (function animRing(){ rx+=(mx-rx)*.22; ry+=(my-ry)*.22; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(animRing); })();
}
</script>
</body>
</html>
