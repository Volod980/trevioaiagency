<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trevio — Our Work</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#000;
  --bg2:#0c0c0c;
  --bg3:#141414;
  --ink:#f0ede8;
  --ink-mid:#555;
  --ink-light:#2a2a2a;
  --green:#3ecf3e;
  --line:rgba(255,255,255,0.07);
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace;font-weight:300;overflow-x:hidden;cursor:none}

body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:100;
}

/* CURSOR */
.cur-dot{width:5px;height:5px;background:var(--green);border-radius:50%;position:fixed;transform:translate(-50%,-50%);pointer-events:none;z-index:99999;transition:width .2s,height .2s,opacity .2s}
.cur-ring{width:28px;height:28px;border:1px solid rgba(62,207,62,.3);border-radius:50%;position:fixed;transform:translate(-50%,-50%);pointer-events:none;z-index:99998;transition:width .3s,height .3s,border-color .3s}
@media(hover:none){.cur-dot,.cur-ring{display:none!important}body{cursor:auto!important}}
body:has(.pair:hover) .cur-ring{width:40px;height:40px;border-color:var(--green)}

/* HEADER */
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:28px 48px;
  border-bottom:1px solid var(--line);
  position:sticky;top:0;
  background:rgba(0,0,0,.92);backdrop-filter:blur(12px);
  z-index:100;
}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;letter-spacing:.1em;display:flex;align-items:center;gap:9px;color:var(--ink)}
.logo-diamond{width:7px;height:7px;background:var(--green);transform:rotate(45deg);flex-shrink:0}
.header-tag{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mid)}

/* HERO */
.intro{display:grid;grid-template-columns:1fr 1fr;min-height:520px;border-bottom:1px solid var(--line)}

.intro-left{
  padding:72px 48px;
  display:flex;flex-direction:column;justify-content:space-between;
  border-right:1px solid var(--line);
}
.intro-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3rem,6vw,5.5rem);
  font-weight:300;line-height:.92;letter-spacing:-.02em;color:var(--ink);
}
.intro-title em{font-style:italic;color:var(--green)}
.intro-bottom{display:flex;flex-direction:column;gap:10px}
.intro-desc{font-size:10px;line-height:2;color:var(--ink-mid);max-width:340px}
.intro-count{font-size:9px;letter-spacing:.25em;color:var(--ink-light);text-transform:uppercase}
.intro-count span{color:var(--green)}

.intro-right{
  position:relative;overflow:hidden;background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  padding:48px;
}

.hero-deck{
  position:relative;
  width:360px;
  height:380px;
}

.hero-photo-wrap{
  position:absolute;
  width:190px;
  height:320px;
  top:50%;left:50%;
}
.hero-photo-wrap:first-child{
  transform:translate(-90%, -50%) rotate(-6deg);
  z-index:1;
}
.hero-photo-wrap:last-child{
  transform:translate(-10%, -50%) rotate(5deg);
  z-index:2;
}

.hero-photo-wrap img{
  width:100%;height:100%;object-fit:cover;object-position:center top;
  display:block;border-radius:6px;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
}

.hero-placeholder{
  width:100%;height:100%;
  background:var(--bg3);border:1px solid var(--line);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-light);font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
}

/* TABS */
.tabs-wrap{padding:0 48px;border-bottom:1px solid var(--line)}
.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x;user-select:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--ink-mid);padding:20px 24px;
  cursor:none;white-space:nowrap;background:none;border:none;
  position:relative;transition:color .25s;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.tab::after{content:'';position:absolute;bottom:0;left:24px;right:24px;height:1px;background:transparent;transition:background .25s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink)}
.tab.active::after{background:var(--green)}

/* CASES */
.cases{padding:32px 48px 100px}
.pair-wrap{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}
.pair-wrap.visible{opacity:1;transform:translateY(0)}

.pair{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  position:relative;overflow:hidden;cursor:none;
  margin-top:1px;background:var(--line);
  max-width:960px;margin-left:auto;margin-right:auto;
}



/* arrow center */
.pair-arrow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:10;width:36px;height:36px;
  background:var(--bg);border:1px solid var(--line);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--ink-mid);
  transition:all .25s ease;
  box-shadow:0 0 0 4px var(--bg);
}
.pair:hover .pair-arrow{
  background:var(--green);border-color:var(--green);color:#000;
  transform:translate(-50%,-50%) scale(1.08);
  box-shadow:0 0 0 4px var(--bg),0 0 20px rgba(62,207,62,.2);
}

/* sides */
.side{position:relative;overflow:hidden;background:var(--bg2);aspect-ratio:4/5}
.side img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;transition:transform .6s cubic-bezier(.25,.46,.45,.94)}
.side img[data-focus="top"]{object-position:center top}
.side img[data-focus="bottom"]{object-position:center bottom}
.pair:hover .side img{transform:scale(1.03)}

.side-label{
  position:absolute;top:14px;
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;
  padding:4px 10px;z-index:5;
}
.side.before .side-label{left:14px;background:rgba(255,255,255,.06);color:var(--ink-mid);border:1px solid var(--line);backdrop-filter:blur(4px)}
.side.after  .side-label{right:14px;background:var(--green);color:#000;font-weight:400}

/* card after arrows */
.card-after-arr{
  position:absolute;top:50%;transform:translateY(-50%);
  width:32px;height:32px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:2px;color:var(--ink);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  cursor:none;transition:all .2s;z-index:6;opacity:0;
}
.side.after:hover .card-after-arr{opacity:1}
.card-after-arr:hover{background:var(--green);color:#000;border-color:var(--green)}
.card-after-arr.left{left:52px}
.card-after-arr.right{right:10px}

/* meta */
.pair-meta{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  margin-bottom:40px;background:var(--line);
  max-width:960px;margin-left:auto;margin-right:auto;
}
.pair-meta-cell{padding:12px 18px;background:var(--bg2);display:flex;justify-content:space-between;align-items:center}
.meta-title{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:400;letter-spacing:.02em;color:var(--ink)}
.meta-tag{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mid)}
.meta-green{color:var(--green)}

.more-badge{
  position:absolute;bottom:14px;right:14px;
  font-family:'Cormorant Garamond',serif;font-size:11px;font-style:italic;letter-spacing:.04em;
  padding:4px 12px;z-index:5;
  background:var(--green);color:#000;pointer-events:none;white-space:nowrap;border-radius:1px;
}

/* GRID SWITCHER */
.tabs-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 48px;border-bottom:1px solid var(--line);
}
.grid-switcher{
  display:flex;gap:2px;align-items:center;
  padding:20px 0;
}
.grid-btn{
  width:32px;height:32px;
  background:none;border:none;
  cursor:none;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;padding:0;
  opacity:.3;
}
.grid-btn:hover{opacity:.7}
.grid-btn.active{opacity:1}
.grid-btn svg rect,.grid-btn svg path{fill:var(--ink);transition:fill .2s}
.grid-btn.active svg rect,.grid-btn.active svg path{fill:var(--green)}

/* label before switcher */
.grid-label{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--ink-mid);
  margin-right:8px;
}

/* cases top bar with switcher */
.cases-header{
  display:flex;justify-content:flex-end;align-items:center;
  padding:16px 48px 0;
  gap:8px;
}
.cases-header .grid-label{font-size:8px;letter-spacing:.15em;color:var(--ink-mid)}
.cases-header .grid-switcher{padding:0;gap:1px}
.cases-header .grid-btn{
  width:30px;height:30px;opacity:.25;
  border:1px solid transparent;border-radius:2px;
}
.cases-header .grid-btn:hover{opacity:.6;border-color:var(--line)}
.cases-header .grid-btn.active{opacity:1;border-color:var(--ink-light)}

/* CASES GRID MODES */
.cases{padding:32px 48px 100px}
.cases.cols-1 .pair{max-width:960px;margin-left:auto;margin-right:auto}
.cases.cols-1 .pair-meta{max-width:960px;margin-left:auto;margin-right:auto}

.cases.cols-2{
  display:grid;grid-template-columns:1fr 1fr;
  gap:32px;padding:32px 48px 100px;
}
.cases.cols-2 .pair-wrap{margin:0}
.cases.cols-2 .pair{max-width:100%;margin:0}
.cases.cols-2 .pair-meta{max-width:100%;margin-left:0;margin-right:0}

.cases.cols-3{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:24px;padding:32px 32px 100px;
}
.cases.cols-3 .pair-wrap{margin:0}
.cases.cols-3 .pair{max-width:100%;margin:0}
.cases.cols-3 .pair-meta{max-width:100%;margin-left:0;margin-right:0}

@media(max-width:900px){
  .cases.cols-3{grid-template-columns:1fr 1fr;gap:20px}
}
@media(max-width:600px){
  .cases.cols-2,.cases.cols-3{grid-template-columns:1fr;gap:16px}
  .tabs-bar{padding:0 20px}
}
footer{border-top:1px solid var(--line);padding:28px 48px;display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:1rem;display:flex;align-items:center;gap:8px;color:var(--ink-mid)}
.footer-email{font-size:10px;color:var(--ink-mid);text-decoration:none;letter-spacing:.03em;border-bottom:1px solid var(--line);padding-bottom:1px;transition:color .2s,border-color .2s}
.footer-email:hover{color:var(--green);border-color:var(--green)}
.footer-copy{font-size:9px;color:var(--ink-light);letter-spacing:.1em}

/* LIGHTBOX */
.lb{
  position:fixed;inset:0;z-index:8000;
  background:rgba(0,0,0,.96);backdrop-filter:blur(24px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .35s ease;
}
.lb.open{opacity:1;pointer-events:all}
.lb-images{display:flex;gap:2px;max-height:78vh;align-items:stretch}
.lb-side{
  position:relative;overflow:hidden;background:var(--bg2);
  transform:translateY(14px);transition:transform .4s cubic-bezier(.25,.46,.45,.94);max-width:38vw;
}
.lb.open .lb-side{transform:translateY(0)}
.lb-side:last-child{transition-delay:.05s}
.lb-side img{height:78vh;width:auto;max-width:38vw;display:block;object-fit:cover}
.lb-side img[data-focus="top"]{object-position:center top}
.lb-side img[data-focus="bottom"]{object-position:center bottom}
.lb-side-label{position:absolute;top:14px;font-size:8px;letter-spacing:.2em;text-transform:uppercase;padding:4px 10px;font-family:'DM Mono',monospace}
.lb-side.before .lb-side-label{left:14px;background:rgba(255,255,255,.07);color:var(--ink-mid);border:1px solid var(--line)}
.lb-side.after  .lb-side-label{right:14px;background:var(--green);color:#000}

.lb-after-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:32px;height:32px;
  background:rgba(0,0,0,.75);border:1px solid var(--line);
  border-radius:2px;color:var(--ink-mid);font-size:20px;line-height:1;
  display:none;align-items:center;justify-content:center;
  cursor:none;transition:all .2s;z-index:10;
}
.lb-after-arrow:hover{background:var(--green);color:#000;border-color:var(--green)}
.lb-after-arrow-left{left:10px}
.lb-after-arrow-right{right:10px}
.lb-side.after:hover .lb-after-arrow,.lb-after-arrow:focus{display:flex}
.lb-dots:not(:empty) ~ * .lb-after-arrow,.lb-side.after .lb-after-arrow{display:flex}

.lb-dots{display:flex;gap:6px;align-items:center}
.lb-dot{width:5px;height:5px;border-radius:50%;background:var(--ink-light);border:none;cursor:none;transition:all .2s;padding:0}
.lb-dot.active{background:var(--green);transform:scale(1.3)}

.lb-bottom{display:flex;justify-content:space-between;align-items:center;width:100%;padding:16px 32px 0;max-width:80vw}
.lb-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;color:var(--ink-mid);letter-spacing:.05em}
.lb-nav{display:flex;gap:6px}
.lb-btn{width:36px;height:36px;border:1px solid var(--line);background:none;color:var(--ink-mid);cursor:none;font-size:14px;border-radius:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'DM Mono',monospace}
.lb-btn:hover{border-color:var(--green);color:var(--green)}
.lb-close{position:fixed;top:22px;right:22px;width:38px;height:38px;border:1px solid var(--line);background:none;color:var(--ink-mid);cursor:none;font-size:13px;border-radius:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'DM Mono',monospace;z-index:8100}
.lb-close:hover{border-color:var(--green);color:var(--green)}

/* RESPONSIVE */
@media(max-width:768px){
  header,footer,.intro-left,.cases,.tabs-wrap{padding-left:20px;padding-right:20px}
  .intro{grid-template-columns:1fr;min-height:auto}
  .intro-right{display:none}
  .lb-images{flex-direction:row;max-height:none;width:100vw;justify-content:center;align-items:center}
  .lb-side.before{display:none}
  .lb-side.after{width:90vw;max-width:90vw;height:75vh;max-height:75vh;border-radius:12px;overflow:hidden;margin:auto;display:flex;align-items:stretch}
  .lb-side.after img{width:90vw;height:75vh;max-height:75vh;object-fit:cover;object-position:center;display:block}
  .cases-header{display:none}
}
@media(max-width:480px){
  .pair-arrow{width:30px;height:30px;font-size:11px}

}
</style>
</head>
<body>

<div class="cur-dot" id="curDot"></div>
<div class="cur-ring" id="curRing"></div>

<header>
  <div class="logo"><div class="logo-diamond"></div>Trevio</div>
  <div class="header-tag">Next-Level Product Visuals</div>
</header>

<div class="intro">
  <div class="intro-left">
    <h1 class="intro-title" id="intro-title"></h1>
    <div class="intro-bottom">
      <p class="intro-desc" id="intro-desc"></p>

    </div>
  </div>
  <div class="intro-right">
    <div class="hero-deck">
      <div class="hero-photo-wrap">
        <div class="hero-placeholder" id="hero-before-ph">your photo</div>
        <img id="hero-before" src="" alt="Product" style="display:none">
      </div>
      <div class="hero-photo-wrap">
        <div class="hero-placeholder" id="hero-after-ph">ai result</div>
        <img id="hero-after" src="" alt="AI Result" style="display:none">
      </div>
    </div>
  </div>
</div>

<div class="tabs-bar">
  <div class="tabs" id="tabs"></div>
</div>

<div class="cases-header">
  <span class="grid-label">View</span>
  <div class="grid-switcher">
    <button class="grid-btn active" id="grid-1" title="1 column">
      <svg width="14" height="14" viewBox="0 0 14 14"><rect x="2" y="2" width="10" height="4" rx="1"/><rect x="2" y="8" width="10" height="4" rx="1"/></svg>
    </button>
    <button class="grid-btn" id="grid-2" title="2 columns">
      <svg width="14" height="14" viewBox="0 0 14 14"><rect x="2" y="2" width="4" height="10" rx="1"/><rect x="8" y="2" width="4" height="10" rx="1"/></svg>
    </button>
    <button class="grid-btn" id="grid-3" title="3 columns">
      <svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="2" width="3" height="10" rx="1"/><rect x="5.5" y="2" width="3" height="10" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/></svg>
    </button>
  </div>
</div>

<div class="cases" id="cases"></div>

<footer>
  <div class="footer-logo"><div class="logo-diamond"></div>Trevio</div>
  <a href="mailto:trevioagency@gmail.com" class="footer-email">trevioagency@gmail.com</a>
  <div class="footer-copy">©2025 Trevio</div>
</footer>

<div class="lb" id="lb">
  <button class="lb-close" id="lb-close">✕</button>
  <div class="lb-images">
    <div class="lb-side before">
      <div class="lb-side-label">Product</div>
      <img id="lb-img-before" src="" alt="">
    </div>
    <div class="lb-side after" style="position:relative">
      <div class="lb-side-label">AI Result</div>
      <img id="lb-img-after" src="" alt="">
      <button class="lb-after-arrow lb-after-arrow-left" id="lb-after-prev">‹</button>
      <button class="lb-after-arrow lb-after-arrow-right" id="lb-after-next">›</button>
    </div>
  </div>
  <div class="lb-bottom">
    <div class="lb-title" id="lb-title"></div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="lb-dots" id="lb-dots"></div>
      <div class="lb-nav">
        <button class="lb-btn" id="lb-prev">←</button>
        <button class="lb-btn" id="lb-next">→</button>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
document.title = SITE_TITLE;
document.getElementById('intro-desc').textContent = SITE_DESC;
document.getElementById('intro-title').innerHTML = `${SITE_LINE1}<br><em>${SITE_LINE2}</em>`;

// ── HERO PHOTOS ──
// Вкажи шляхи до фото нижче щоб показати їх у hero секції
const HERO_BEFORE = 'https://res.cloudinary.com/danbmkdx8/image/upload/v1772750120/hf_20260301_202225_0b6204f8-a2e5-4e68-b96f-05de71711523_ns8df3.jpg';  // напр. "photos/parfumes/1_до.png"
const HERO_AFTER  = 'https://res.cloudinary.com/danbmkdx8/image/upload/v1772750221/hf_20260301_202655_a74a14c6-af04-4219-846c-0a7e15969091_aml2pd.jpg';  // напр. "photos/parfumes/1_4_після.webp"
if (HERO_BEFORE) { document.getElementById('hero-before-ph').style.display='none'; const i=document.getElementById('hero-before'); i.src=HERO_BEFORE; i.style.display='block'; }
if (HERO_AFTER)  { document.getElementById('hero-after-ph').style.display='none';  const i=document.getElementById('hero-after');  i.src=HERO_AFTER;  i.style.display='block'; }

// ── TABS & CASES ──
const tabsEl=document.getElementById('tabs');
const casesEl=document.getElementById('cases');
const countEl={textContent:''};  // removed from UI, keep as dummy
const allTags=['All',...new Set(CASES.map(c=>c.tag))];
let activeTab='All', currentFiltered=[...CASES], lbCur=0, lbAfterIdx=0;

// ── GRID SWITCHER ──
let currentCols=1;
casesEl.classList.add('cols-1');
[1,2,3].forEach(n=>{
  document.getElementById('grid-'+n).addEventListener('click',()=>{
    currentCols=n;
    [1,2,3].forEach(x=>document.getElementById('grid-'+x).classList.toggle('active',x===n));
    casesEl.className='cases cols-'+n;
  });
});

allTags.forEach(tag=>{
  const btn=document.createElement('button');
  btn.className='tab'+(tag==='All'?' active':'');
  btn.textContent=tag;
  btn.addEventListener('click',()=>switchTab(tag));
  tabsEl.appendChild(btn);
});

function switchTab(tag,updateHash=true){
  activeTab=tag;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.textContent===tag));  currentFiltered=tag==='All'?[...CASES]:CASES.filter(c=>c.tag===tag);
  countEl.textContent=currentFiltered.length;
  renderCases(currentFiltered);
  if(updateHash){const hash=tag==='All'?'':'#'+tag.toLowerCase().replace(/ /g,'-');history.replaceState(null,'',hash||window.location.pathname);}
}

function renderCases(list){
  casesEl.style.opacity='0'; casesEl.style.transform='translateY(8px)'; casesEl.style.transition='opacity .25s ease,transform .25s ease';
  casesEl.className='cases cols-'+currentCols;
  setTimeout(()=>{
    casesEl.innerHTML='';
    list.forEach((c,i)=>{
      const wrap=document.createElement('div');
      wrap.className='pair-wrap'; wrap.style.transitionDelay=`${i*.06}s`;
      const afterArr=[...(Array.isArray(c.after)?c.after:[c.after]),...(c.results||[])];
      const hasMore=afterArr.length>1;
      let cardAfterIdx=0;
      wrap.innerHTML=`
        <div class="pair" data-idx="${i}">
          <div class="side before">
            <div class="side-label">Product</div>
            <img src="${c.before}" loading="lazy" alt="${c.title}" data-focus="${c.focusBefore||'center'}">
          </div>
          <div class="pair-arrow">→</div>
          <div class="side after">
            <div class="side-label">AI Result</div>
            <img src="${afterArr[0]}" loading="lazy" alt="${c.title}" data-focus="${c.focusAfter||'top'}" class="after-img">
            ${hasMore?`<button class="card-after-arr left" data-dir="-1">‹</button>`:''}
            ${hasMore?`<button class="card-after-arr right" data-dir="1">›</button>`:''}
            ${hasMore?`<div class="more-badge">+${afterArr.length-1} more</div>`:''}
          </div>
        </div>
        <div class="pair-meta">
          <div class="pair-meta-cell"><span class="meta-title">${c.title}</span><span class="meta-tag">${c.tag}</span></div>
          <div class="pair-meta-cell"><span class="meta-tag meta-green">AI Generated</span><span class="meta-tag">Trevio ◆</span></div>
        </div>`;
      wrap.querySelector('.pair').addEventListener('click',()=>openLb(i,cardAfterIdx));
      if(hasMore){
        wrap.querySelectorAll('.card-after-arr').forEach(btn=>{
          btn.addEventListener('click',e=>{
            e.stopPropagation();
            cardAfterIdx=(cardAfterIdx+parseInt(btn.dataset.dir)+afterArr.length)%afterArr.length;
            const img=wrap.querySelector('.after-img');
            img.style.opacity='0'; img.style.transition='opacity .2s';
            setTimeout(()=>{img.src=afterArr[cardAfterIdx]; img.style.opacity='1'; const b=wrap.querySelector('.more-badge'); if(b)b.textContent=`+${afterArr.length-1} more`;},150);
          });
        });
      }
      casesEl.appendChild(wrap);
    });
    casesEl.style.opacity='1'; casesEl.style.transform='translateY(0)';
    requestAnimationFrame(()=>{ document.querySelectorAll('.pair-wrap').forEach((el,i)=>setTimeout(()=>el.classList.add('visible'),i*60)); });
  },260);
}

// ── LIGHTBOX ──
const lb=document.getElementById('lb');
const lbBefore=document.getElementById('lb-img-before');
const lbAfter=document.getElementById('lb-img-after');
const lbTitleEl=document.getElementById('lb-title');
const lbDotsEl=document.getElementById('lb-dots');

function openLb(i,afterIdx=0){lbCur=i;lbAfterIdx=afterIdx;updateLb();lb.classList.add('open');document.body.style.overflow='hidden';}
function closeLb(){lb.classList.remove('open');document.body.style.overflow='';}
function getAfterArr(c){return[...(Array.isArray(c.after)?c.after:[c.after]),...(c.results||[])];}
function updateLb(){
  const c=currentFiltered[lbCur]; const afterArr=getAfterArr(c);
  lbBefore.style.opacity='0'; lbAfter.style.opacity='0';
  setTimeout(()=>{
    lbBefore.src=c.before; lbBefore.setAttribute('data-focus',c.focusBefore||'center');
    lbAfter.src=afterArr[lbAfterIdx]||afterArr[0]; lbAfter.setAttribute('data-focus',c.focusAfter||'top');
    lbTitleEl.textContent=c.title;
    lbDotsEl.innerHTML='';
    if(afterArr.length>1){afterArr.forEach((_,di)=>{const dot=document.createElement('button');dot.className='lb-dot'+(di===lbAfterIdx?' active':'');dot.addEventListener('click',()=>{lbAfterIdx=di;updateLb();});lbDotsEl.appendChild(dot);});}
    lbBefore.style.opacity='1'; lbAfter.style.opacity='1';
  },200);
}
function lbNextAfter(){const a=getAfterArr(currentFiltered[lbCur]);lbAfterIdx=(lbAfterIdx+1)%a.length;updateLb();}
function lbPrevAfter(){const a=getAfterArr(currentFiltered[lbCur]);lbAfterIdx=(lbAfterIdx-1+a.length)%a.length;updateLb();}

document.getElementById('lb-close').addEventListener('click',closeLb);
document.getElementById('lb-prev').addEventListener('click',()=>{lbCur=(lbCur-1+currentFiltered.length)%currentFiltered.length;lbAfterIdx=0;updateLb();});
document.getElementById('lb-next').addEventListener('click',()=>{lbCur=(lbCur+1)%currentFiltered.length;lbAfterIdx=0;updateLb();});
document.getElementById('lb-after-prev').addEventListener('click',lbPrevAfter);
document.getElementById('lb-after-next').addEventListener('click',lbNextAfter);
lb.addEventListener('click',e=>{if(e.target===lb)closeLb();});
document.addEventListener('keydown',e=>{
  if(!lb.classList.contains('open'))return;
  if(e.key==='Escape')closeLb();
  if(e.key==='ArrowLeft'){lbCur=(lbCur-1+currentFiltered.length)%currentFiltered.length;lbAfterIdx=0;updateLb();}
  if(e.key==='ArrowRight'){lbCur=(lbCur+1)%currentFiltered.length;lbAfterIdx=0;updateLb();}
});

// ── HASH ROUTING ──
function getTabFromHash(){const hash=window.location.hash.replace('#','').replace(/-/g,' ');if(!hash)return'All';return allTags.find(t=>t.toLowerCase()===hash.toLowerCase())||'All';}
const initialTab=getTabFromHash();
document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.textContent===initialTab));
currentFiltered=initialTab==='All'?[...CASES]:CASES.filter(c=>c.tag===initialTab);
activeTab=initialTab;
countEl.textContent=currentFiltered.length;
renderCases(currentFiltered);
window.addEventListener('hashchange',()=>switchTab(getTabFromHash(),false));

// ── CURSOR ──
const dot=document.getElementById('curDot');
const ring=document.getElementById('curRing');
if(window.matchMedia('(hover: hover)').matches){
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
  (function animRing(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing);})();
}
</script>
